# Định nghĩa zone rate limiting (lưu trong shared memory 10MB)
# Ước tính: 10MB chứa được ~160.000 địa chỉ IP

# Zone chung cho static assets và các route thông thường (thoải mái)
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# Zone cho các API nghiệp vụ thông thường
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Zone cho auth (login/register) - chặt nhất để chống brute force
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Trả 429 thay vì 503 khi bị rate limit
limit_req_status 429;

server {
    listen 80;

    # ------------------------------------------------------------------
    # Webhook SePay: Bypass hoàn toàn rate limiting
    # Chỉ SePay server mới gọi endpoint này nên không cần giới hạn
    # Đồng bộ path với Java filter (/api/payments)
    # ------------------------------------------------------------------
    location /api/payments/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Auth endpoints: Rate limit nghiêm ngặt chống brute force
    # 5 req/phút, burst 3 (cho phép submit form nhanh 1-2 lần)
    # ------------------------------------------------------------------
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # API endpoints: Rate limit vừa phải
    # 10 req/s, burst=20 cho phép load trang (nhiều API call song song)
    # delay=10: 10 req đầu xử lý ngay, req thứ 11-20 xếp hàng, >20 bị từ chối
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 delay=10;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Static assets và root: Thoải mái hơn
    # 20 req/s, burst=50 nodelay (hình ảnh, JS, CSS tải song song)
    # ------------------------------------------------------------------
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}