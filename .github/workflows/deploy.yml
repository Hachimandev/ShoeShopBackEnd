name: CI/CD Pipeline for ShoeShop Backend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        timeout: 120s
        command_timeout: 30m
        script: |
          set -e

          cd ~/ShoeShopBackEnd

          echo "===== Pull latest code ====="
          git pull origin main

          echo "===== Stop old containers ====="
          docker-compose down

          echo "===== Build backend ====="
          DOCKER_BUILDKIT=0 COMPOSE_DOCKER_CLI_BUILD=0 docker-compose build backend

          echo "===== Start containers ====="
          docker-compose up -d

          echo "===== Wait for backend startup ====="
          sleep 30

          echo "===== Backend logs ====="
          docker logs shoeshop_backend --tail 50

          echo "===== Health check ====="
          for i in {1..10}; do
            curl -f http://localhost:8080/api/products && break
            echo "Retry $i..."
            sleep 10
          done

          echo "===== Remove unused images ====="
          docker image prune -af

          echo "===== Running containers ====="
          docker ps